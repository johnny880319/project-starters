# NOTE:
# This workflow is designed for a monorepo layout where TypeScript code lives in `typescript/`.
# If TypeScript files are moved to repository root:
# 1) Remove `on.push.paths` / `on.pull_request.paths`.
# 2) Remove `defaults.run.working-directory`.
# 3) Update `cache-dependency-path` and any hard-coded paths.

name: TypeScript CI

on:
  push:
    branches: ["main"]
    paths:
      - "typescript/**"
      - ".github/workflows/typescript-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "typescript/**"
      - ".github/workflows/typescript-ci.yml"

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./typescript

    steps:
      - uses: actions/checkout@v6

      - name: Set up Environment
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: "typescript/pnpm-lock.yaml"

      - name: Sync dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and format check
        run: pnpm biome check .

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Run tests
        run: pnpm vitest run
