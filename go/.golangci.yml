version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - asciicheck
    - bidichk
    - copyloopvar
    - dupl
    - durationcheck
    - errcheck
    - errorlint
    - exhaustive
    - gocheckcompilerdirectives
    - gocognit
    - gocritic
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - usetesting
    - wastedassign
    - whitespace

  settings:
    dupl:
      threshold: 150
    exhaustive:
      default-signifies-exhaustive: true
    gocognit:
      min-complexity: 20
    lll:
      line-length: 120
    nakedret:
      max-func-lines: 20
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: early-return
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unused-parameter

  exclusions:
    paths:
      - .cache
    rules:
      - path: _test\.go
        linters:
          - dupl
          - gosec


formatters:
  enable:
    - gofmt

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
